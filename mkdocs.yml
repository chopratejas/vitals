site_name: Vitals
site_url: https://chopratejas.github.io/vitals
site_description: Codebase vital signs for Claude Code
site_author: Tejas Chopra
repo_url: https://github.com/chopratejas/vitals
repo_name: chopratejas/vitals

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How It Works: how-it-works.md
  - Health Scores: health-scores.md
  - Trend Tracking: trends.md
  - AI Provenance: provenance.md
  - Architecture: architecture.md
  - Roadmap: roadmap.md
  - Privacy Policy: privacy.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
